<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F1115" />
    <meta
      name="description"
      content="GrãoCerto — Inteligência de comercialização para o produtor rural brasileiro."
    />
    <title>GrãoCerto — Inteligência de Comercialização</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,400&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0;
        background: #0F1115;
        color-scheme: dark;
        font-family: 'Inter', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Remove spinners dos inputs numéricos */
      input[type=number]::-webkit-inner-spin-button,
      input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
      input[type=number] { -moz-appearance: textfield; }
      /* Focus ring verde */
      input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: #22C55E !important;
        box-shadow: 0 0 0 3px rgba(34,197,94,0.15) !important;
      }
      /* Scrollbar dark */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: #0F1115; }
      ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
      /* Range input verde */
      input[type=range] { accent-color: #22C55E; }
      /* Select dark */
      select option { background: #1A1D24; color: #F8FAFC; }
      /* Details/summary */
      details > summary { cursor: pointer; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
